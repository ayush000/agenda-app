<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Rounded Rect Background -->
  <rect x="10" y="10" width="80" height="80" rx="15" fill="black" />
  
  <!-- Calendar Header -->
  <rect x="10" y="10" width="80" height="20" rx="5" fill="white" opacity="0.2" />
  
  <!-- "A" for Agenda -->
  <text x="50" y="65" font-family="Arial, sans-serif" font-weight="900" font-size="50" fill="white" text-anchor="middle">A</text>
  
  <!-- Three dots representing list items -->
  <circle cx="30" cy="80" r="4" fill="white" />
  <circle cx="50" cy="80" r="4" fill="white" />
  <circle cx="70" cy="80" r="4" fill="white" />
</svg>
